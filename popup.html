<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X TL Filter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <span class="x-logo">𝕏</span>
        <div class="header-text">
          <h1>TL Filter</h1>
          <p class="description">低エンゲージメント投稿をタイムラインから非表示</p>
        </div>
      </header>

      <section class="settings">
        <div class="filter-row">
          <label class="toggle-label">
            <input id="inline-filter" type="checkbox" />
            <span class="toggle-switch"></span>
            <span class="toggle-text">フィルターON</span>
          </label>
        </div>
        <div class="threshold-row">
          <label for="min-score">デフォルトしきい値</label>
          <input id="min-score" type="number" min="0" step="10" value="10000" />
        </div>
        <p class="hint">Raw Score（いいね + リポスト×3 + リプライ×2）がしきい値未満の投稿を非表示にします。</p>
      </section>

      <section class="user-thresholds">
        <h2>ユーザー別しきい値</h2>
        <div class="add-user-row">
          <input id="user-handle" type="text" placeholder="@handle" />
          <input id="user-threshold" type="number" min="0" step="10" value="0" />
          <button id="add-user-btn" type="button">追加</button>
        </div>
        <p class="hint">0 = 常に表示。正数 = そのユーザー専用しきい値。</p>
        <ul id="user-threshold-list" class="user-threshold-list"></ul>
        <p id="empty-hint" class="empty-hint">ユーザー別の設定はありません。</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
